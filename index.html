/* ---------- helpers ---------- */
function todayDayNumber() {
  const now = new Date();
  const t = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.floor((t - START_DATE) / 86400000) + 1;
  return Math.min(42, Math.max(1, diff));
}
function reduced() { return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
function shuffle(arr){ const a=[...arr]; for(let j=a.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1)); [a[j],a[k]]=[a[k],a[j]];} return a; }

function fireConfetti(big) {
  if (reduced()) return;
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#3fb950','#f2a900','#4f9dff','#b083f0','#f0556b','#ff8c42'];
  const count = big ? 170 : 90;
  const parts = [];
  for (let i=0;i<count;i++){
    parts.push({ x: canvas.width/2 + (Math.random()-0.5)*220, y: canvas.height/3,
      vx:(Math.random()-0.5)*9, vy:Math.random()*-9-4, g:0.26+Math.random()*0.12,
      size:4+Math.random()*5, color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.3, life:0, max:70+Math.random()*45 });
  }
  let frame=0;
  (function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    parts.forEach(p=>{ if(p.life>p.max) return; alive=true;
      p.life++; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      ctx.save(); ctx.globalAlpha=Math.max(0,1-p.life/p.max); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.62); ctx.restore(); });
    frame++;
    if(alive && frame<240) requestAnimationFrame(tick); else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

/* ---------- Quick Drill ---------- */
function Drill({ onClose }) {
  const cats = useMemo(()=>{ const c=[]; CARDS.forEach(x=>{ if(!c.includes(x.c)) c.push(x.c); }); return c; },[]);
  const counts = useMemo(()=>{ const m={}; CARDS.forEach(x=>{ m[x.c]=(m[x.c]||0)+1; }); return m; },[]);
  const [mode,setMode]=useState('menu');
  const [deck,setDeck]=useState([]);
  const [i,setI]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [got,setGot]=useState(0);
  const [missed,setMissed]=useState([]);

  const start=(filter)=>{
    let pool;
    if(filter==='all') pool=shuffle(CARDS);
    else if(filter==='random') pool=shuffle(CARDS).slice(0,15);
    else pool=shuffle(CARDS.filter(x=>x.c===filter));
    setDeck(pool); setI(0); setFlipped(false); setGot(0); setMissed([]); setMode('play');
  };
  const grade=(knew)=>{
    const card=deck[i];
    if(knew) setGot(g=>g+1); else setMissed(m=>[...m,card]);
    if(i+1>=deck.length) setMode('summary');
    else { setI(i+1); setFlipped(false); }
  };
  const drillMissed=()=>{ const pool=shuffle(missed); setDeck(pool); setI(0); setFlipped(false); setGot(0); setMissed([]); setMode('play'); };

  return (
    <div className="drill-overlay">
      <div className="drill-wrap">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:18,fontWeight:700}}><span style={{color:'#f2a900'}}>⚡</span> Quick Drill</div>
          <button className="reset-btn" onClick={onClose}>✕ Close</button>
        </div>

        {mode==='menu' && (
          <div>
            <p className="mono" style={{color:'#8b98a8',fontSize:12.5,marginBottom:16,lineHeight:1.6}}>
              {CARDS.length} cards. Pick a stack, flip, grade yourself. 2-minute rounds.
            </p>
            <div style={{display:'flex',gap:10,marginBottom:14}}>
              <button className="btn-drill" style={{flex:1}} onClick={()=>start('random')}>🎲 Random 15</button>
              <button className="btn-go" style={{flex:1}} onClick={()=>start('all')}>▶ All {CARDS.length}</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {cats.map(c=>(
                <button key={c} className="cat-btn" onClick={()=>start(c)}>
                  <span>{c}</span><span className="n">{counts[c]}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {mode==='play' && (
          <div>
            <div className="mono" style={{display:'flex',justifyContent:'space-between',color:'#8b98a8',fontSize:12,marginBottom:12}}>
              <span>{i+1} / {deck.length}</span>
              <span><span style={{color:'#3fb950'}}>✓ {got}</span> &nbsp; <span style={{color:'#f0556b'}}>✗ {missed.length}</span></span>
            </div>
            <div className="flip" onClick={()=>setFlipped(f=>!f)}>
              <div className={`flip-inner ${flipped?'flipped':''}`}>
                <div className="face">
                  <div className="mono" style={{fontSize:10,color:'#8b98a8',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:14}}>{deck[i].c}</div>
                  <div style={{fontSize:22,fontWeight:600}}>{deck[i].f}</div>
                  <div className="mono" style={{fontSize:11,color:'#566',marginTop:18}}>tap to flip</div>
                </div>
                <div className="face back">
                  <div style={{fontSize:18,fontWeight:500,color:'#3fb950',lineHeight:1.5}}>{deck[i].b}</div>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginTop:14}}>
              <button className="grade-miss" onClick={()=>grade(false)}>Missed it</button>
              <button className="grade-got" onClick={()=>grade(true)}>Got it ✓</button>
            </div>
          </div>
        )}

        {mode==='summary' && (() => {
          const total = got + missed.length;
          const pct = total===0?0:Math.round(got/total*100);
          const color = pct>=80?'#3fb950':pct>=60?'#f2a900':'#f0556b';
          return (
            <div style={{textAlign:'center',paddingTop:10}}>
              <div className="mono" style={{fontSize:12,color:'#8b98a8',letterSpacing:'.1em',textTransform:'uppercase'}}>Round complete</div>
              <div style={{fontSize:52,fontWeight:700,color,margin:'8px 0',fontFamily:"'IBM Plex Mono',monospace"}}>{pct}%</div>
              <div className="mono" style={{color:'#8b98a8',fontSize:14,marginBottom:22}}>{got} of {total} cards</div>
              <div style={{display:'flex',flexDirection:'column',gap:10,maxWidth:320,margin:'0 auto'}}>
                {missed.length>0 && <button className="btn-drill" onClick={drillMissed}>🔁 Drill {missed.length} missed</button>}
                <button className="btn-go" onClick={()=>setMode('menu')}>↺ New round</button>
                <button className="reset-btn" onClick={onClose}>Done</button>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

function StudyTracker() {
  const [completed, setCompleted] = useState(() => {
    try { const s = window.localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : {}; }
    catch (e) { return {}; }
  });
  const todayNum = useMemo(todayDayNumber, []);
  const todayEntry = useMemo(()=>SCHEDULE.find(d=>d.day===todayNum), [todayNum]);
  const [activeWeek, setActiveWeek] = useState(todayEntry ? todayEntry.week : 1);
  const [justToggled, setJustToggled] = useState(null);
  const [toast, setToast] = useState(null);
  const [drillOpen, setDrillOpen] = useState(false);
  const todayRef = useRef(null);

  useEffect(() => {
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch (e) {}
  }, [completed]);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2300); };

  const toggleTask = (day, idx) => {
    const key = `${day}-${idx}`;
    const next = { ...completed, [key]: !completed[key] };
    const dayObj = SCHEDULE.find(d => d.day === day);
    const before = dayObj.tasks.every((_, i) => completed[`${day}-${i}`]);
    const after = dayObj.tasks.every((_, i) => next[`${day}-${i}`]);
    setCompleted(next);
    setJustToggled(key);
    setTimeout(() => setJustToggled(null), 360);
    if (!before && after) {
      fireConfetti(false);
      showToast(`Day ${day} complete 🎉`);
      const weekDays = SCHEDULE.filter(d => d.week === dayObj.week);
      const weekDone = weekDays.every(d => d.tasks.every((_, i) => next[`${d.day}-${i}`]));
      if (weekDone) setTimeout(() => { fireConfetti(true); showToast(`Week ${dayObj.week} crushed 🔥`); }, 450);
    }
  };

  const resetAll = () => { if (window.confirm('Reset all progress? This cannot be undone.')) setCompleted({}); };

  const daysUntilExam = useMemo(() => {
    const diff = EXAM_DATE - new Date();
    return Math.max(0, Math.ceil(diff / (1000*60*60*24)));
  }, []);

  const dayComplete = (dn) => { const o=SCHEDULE.find(d=>d.day===dn); return o && o.tasks.length>0 && o.tasks.every((_,i)=>completed[`${dn}-${i}`]); };
  const streak = useMemo(() => {
    let n = todayNum; if (!dayComplete(n)) n = n-1;
    let s=0; while(n>=1 && dayComplete(n)){ s++; n--; } return s;
  }, [completed, todayNum]);

  const totalTasks = SCHEDULE.reduce((acc, d) => acc + d.tasks.length, 0);
  const completedCount = Object.values(completed).filter(Boolean).length;
  const progressPct = totalTasks === 0 ? 0 : Math.round((completedCount / totalTasks) * 100);

  const weeks = [1,2,3,4,5,6];
  const weekLabels = { 1:'Domain 1', 2:'Domain 2', 3:'Domain 3', 4:'Domain 4 (pt 1)', 5:'Domain 4/5', 6:'Sims + Exam' };
  const visibleDays = SCHEDULE.filter(d => d.week === activeWeek);

  const todayDone = todayEntry ? todayEntry.tasks.filter((_,i)=>completed[`${todayEntry.day}-${i}`]).length : 0;
  const todayTotal = todayEntry ? todayEntry.tasks.length : 0;
  const tColor = todayEntry ? (DOMAIN_COLORS[todayEntry.domain] || '#8b98a8') : '#8b98a8';

  const jumpToToday = () => {
    if (!todayEntry) return;
    setActiveWeek(todayEntry.week);
    setTimeout(() => { if (todayRef.current) todayRef.current.scrollIntoView({ behavior:'smooth', block:'center' }); }, 70);
  };

  return (
    <div>
      <div style={{ padding: '30px 16px 10px', maxWidth: 840, margin: '0 auto' }}>
        <h1 style={{ fontSize: 25, fontWeight: 700, letterSpacing: '-0.5px' }}>
          SY0-701 <span style={{ color: '#f2a900' }}>·</span> 42-Day Sprint
        </h1>
        <p style={{ color: '#8b98a8', fontSize: 13.5, marginTop: 4 }}>
          June 19 → July 30, 2026 · Exam 10:15 AM · Check-in 9:45 AM
        </p>
      </div>

      <div style={{ position:'sticky', top:0, zIndex:20, background:'rgba(14,17,22,0.92)', backdropFilter:'blur(10px)', borderBottom:'1px solid #283340' }}>
        <div style={{ maxWidth:840, margin:'0 auto', padding:'12px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:14 }}>
          <div className="mono" style={{ fontSize:13, color:'#8b98a8', whiteSpace:'nowrap' }}>
            <span style={{ color:'#f2a900', fontWeight:700 }}>{daysUntilExam}</span> days left
          </div>
          <div className="mono" style={{ fontSize:13, color: streak>0?'#ff8c42':'#566', whiteSpace:'nowrap' }}>
            🔥 <span style={{fontWeight:700}}>{streak}</span>
          </div>
          <div style={{ flex:1, maxWidth:160 }}>
            <div style={{ height:6, background:'#1c232d', borderRadius:99, overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${progressPct}%`, background:'#3fb950', borderRadius:99, transition:'width 0.3s' }} />
            </div>
          </div>
          <div className="mono" style={{ fontSize:13, color:'#3fb950', fontWeight:700 }}>{progressPct}%</div>
        </div>
      </div>

      <div style={{ maxWidth:840, margin:'0 auto', padding:'18px 16px 0' }}>
        {todayEntry && (
          <div className="hero">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
              <div>
                <div className="mono" style={{fontSize:11,color:'#f2a900',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:6}}>● Today</div>
                <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Day {todayEntry.day} of 42 <span style={{color:'#8b98a8',fontWeight:500,fontSize:15}}>· {todayEntry.date}</span></div>
                <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                  <span className="mono" style={{fontSize:11,fontWeight:700,color:tColor,background:`${tColor}1a`,padding:'3px 8px',borderRadius:4,border:`1px solid ${tColor}44`}}>{todayEntry.domain}</span>
                  <span style={{fontSize:13.5,color:'#c9d4e0'}}>{todayEntry.domainName}</span>
                </div>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <span className="chip" style={{color: todayDone===todayTotal?'#3fb950':'#8b98a8'}}>{todayDone}/{todayTotal} today</span>
                <span className="chip" style={{color: streak>0?'#ff8c42':'#8b98a8'}}>🔥 {streak} streak</span>
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginTop:16,flexWrap:'wrap'}}>
              <button className="btn-go" onClick={jumpToToday}>↓ Jump to today</button>
              <button className="btn-drill" onClick={()=>setDrillOpen(true)}>⚡ Quick Drill</button>
            </div>
            {streak===0 && <div className="mono" style={{fontSize:11,color:'#8b98a8',marginTop:12}}>Finish all of today's tasks to start a streak.</div>}
          </div>
        )}
      </div>

      <div style={{ maxWidth:840, margin:'0 auto', padding:'16px 16px' }}>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:16, alignItems:'center' }}>
          {weeks.map(w => (
            <button key={w} className={`week-btn ${activeWeek===w?'active':''}`} onClick={()=>setActiveWeek(w)}>
              Week {w} — {weekLabels[w]}
            </button>
          ))}
          <button className="reset-btn" onClick={resetAll} style={{ marginLeft:'auto' }}>Reset progress</button>
        </div>

        {visibleDays.map(d => {
          const dayCompletedCount = d.tasks.filter((_, idx) => completed[`${d.day}-${idx}`]).length;
          const isDayDone = dayCompletedCount === d.tasks.length;
          const isToday = d.day === todayNum;
          const color = DOMAIN_COLORS[d.domain] || '#8b98a8';
          return (
            <div key={d.day} ref={isToday?todayRef:null}
              className={isToday?'day-today':''}
              style={{ background:'#161b22', border:`1px solid ${isDayDone?'#3fb950':'#283340'}`, borderRadius:10, marginBottom:12, overflow:'hidden' }}>
              <div style={{ padding:'12px 16px', display:'flex', alignItems:'center', gap:12, borderBottom:'1px solid #283340' }}>
                <div className="mono" style={{ fontSize:11, fontWeight:700, color, background:`${color}1a`, padding:'3px 8px', borderRadius:4, border:`1px solid ${color}44`, whiteSpace:'nowrap' }}>
                  Day {d.day}
                </div>
                <div className="mono" style={{ fontSize:12, color:'#8b98a8', whiteSpace:'nowrap' }}>{d.date}</div>
                <div style={{ flex:1, fontSize:13, fontWeight:600 }}>{d.domainName}</div>
                {isToday && <div className="mono" style={{fontSize:10,fontWeight:700,color:'#f2a900',background:'rgba(242,169,0,.14)',padding:'2px 7px',borderRadius:10,border:'1px solid #f2a90055'}}>TODAY</div>}
                <div className="mono" style={{ fontSize:11, color:'#8b98a8', whiteSpace:'nowrap' }}>{dayCompletedCount}/{d.tasks.length}</div>
              </div>
              <div style={{ padding:'8px 16px' }}>
                {d.tasks.map((task, idx) => {
                  const key = `${d.day}-${idx}`;
                  const isDone = !!completed[key];
                  return (
                    <div key={idx} className="task-row" onClick={() => toggleTask(d.day, idx)} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'8px 4px', borderRadius:6, cursor:'pointer' }}>
                      <div className={`checkbox-custom ${isDone?'done':''} ${justToggled===key?'pop':''}`} style={{ marginTop:1 }}>
                        {isDone && <span style={{ color:'#0e1116', fontSize:12, fontWeight:700 }}>✓</span>}
                      </div>
                      <span style={{ fontSize:13.5, lineHeight:1.5, color: isDone?'#8b98a8':'#e6edf3', textDecoration: isDone?'line-through':'none' }}>{task}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {toast && <div className="toast">{toast}</div>}
      {drillOpen && <Drill onClose={()=>setDrillOpen(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StudyTracker />);
</script>
</body>
</html>
