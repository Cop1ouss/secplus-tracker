<style>

  body { font-family: 'IBM Plex Sans', sans-serif; background: #0e1116; color: #e6edf3; min-height: 100vh; padding-bottom: 60px; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .task-row { transition: background 0.15s; }
  .task-row:hover { background: #1c232d; }
  .checkbox-custom { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid #283340; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .checkbox-custom.done { background: #3fb950; border-color: #3fb950; }
  .week-btn { font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px 14px; border-radius: 6px; cursor: pointer; border: 1px solid #283340; background: #161b22; color: #8b98a8; transition: all 0.15s; white-space: nowrap; }
  .week-btn:hover { border-color: #3a4654; color: #e6edf3; }
  .week-btn.active { background: rgba(242,169,0,0.12); border-color: #f2a900; color: #f2a900; }
  .reset-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: 1px solid #283340; background: transparent; color: #8b98a8; transition: all 0.15s; }
  .reset-btn:hover { border-color: #f0556b; color: #f0556b; }
</style>

  { day: 13, date: 'Wed Jul 1', week: 2, domain: 'D2', domainName: 'Threats, Vulnerabilities & Mitigations', tasks: [

  { day: 14, date: 'Thu Jul 2', week: 2, domain: 'D2', domainName: 'Threats, Vulnerabilities & Mitigations', tasks: [

  { day: 20, date: 'Wed Jul 8', week: 3, domain: 'D3', domainName: 'Security Architecture', tasks: [

  { day: 25, date: 'Mon Jul 13', week: 4, domain: 'D4', domainName: 'Security Operations (Part 1)', tasks: [

    'Dion: Section 4 (second quarter)',

  { day: 26, date: 'Tue Jul 14', week: 4, domain: 'D4', domainName: 'Security Operations (Part 1)', tasks: [

  { day: 30, date: 'Sat Jul 18', week: 5, domain: 'D4/D5', domainName: 'Security Operations (Part 2) + Program Mgmt', tasks: [

  { day: 31, date: 'Sun Jul 19', week: 5, domain: 'D4/D5', domainName: 'Security Operations (Part 2) + Program Mgmt', tasks: [

  { day: 32, date: 'Mon Jul 20', week: 5, domain: 'D5', domainName: 'Security Program Management & Oversight', tasks: [

    'AD Lab: ticketing systems module — ties to operational governance' ] },
  { day: 33, date: 'Tue Jul 21', week: 5, domain: 'D5', domainName: 'Security Program Management & Oversight', tasks: [

  { day: 34, date: 'Wed Jul 22', week: 5, domain: 'D5', domainName: 'Security Program Management & Oversight', tasks: [

  { day: 36, date: 'Fri Jul 24', week: 6, domain: 'SIM', domainName: 'Full Simulation Exam #1', tasks: [

  { day: 38, date: 'Sun Jul 26', week: 6, domain: 'SIM', domainName: 'Full Simulation Exam #2', tasks: [

  { day: 42, date: 'Thu Jul 30', week: 6, domain: 'EXAM', domainName: 'EXAM DAY', tasks: [

    'Exam starts 10:15 AM — 90Q / 90min, passing score 750/900',
    'Multiple choice first, flag and return to PBQs',
    "You've put in 42 days of work — trust your prep" ] },
];

const DOMAIN_COLORS = {
  D1: '#4f9dff', D2: '#f0556b', D3: '#b083f0', D4: '#f2a900',
  'D4/D5': '#f2a900', D5: '#3fb950', SIM: '#e6edf3', DRILL: '#ff8c42',
  TAPER: '#8b98a8', EXAM: '#f2a900',
};

const STORAGE_KEY = 'secplus42_progress';

function StudyTracker() {
  const [completed, setCompleted] = useState(() => {
    try {
      const saved = window.localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    } catch (e) { return {}; }
  });
  const [activeWeek, setActiveWeek] = useState(1);

  useEffect(() => {
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch (e) {}
  }, [completed]);

  const toggleTask = (day, idx) => {
    const key = `${day}-${idx}`;
    setCompleted(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const resetAll = () => {
    if (window.confirm('Reset all progress? This cannot be undone.')) {
      setCompleted({});
    }
  };

  const daysUntilExam = useMemo(() => {
    const now = new Date();
    const diff = EXAM_DATE - now;
    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
  }, []);

  const totalTasks = SCHEDULE.reduce((acc, d) => acc + d.tasks.length, 0);
  const completedCount = Object.values(completed).filter(Boolean).length;
  const progressPct = totalTasks === 0 ? 0 : Math.round((completedCount / totalTasks) * 100);

  const weeks = [1, 2, 3, 4, 5, 6];
  const weekLabels = { 1: 'Domain 1', 2: 'Domain 2', 3: 'Domain 3', 4: 'Domain 4 (pt 1)', 5: 'Domain 4/5', 6: 'Sims + Exam' };
  const visibleDays = SCHEDULE.filter(d => d.week === activeWeek);

  return (
    <div>
      <div style={{ padding: '30px 16px 16px', maxWidth: 840, margin: '0 auto' }}>
        <h1 style={{ fontSize: 25, fontWeight: 700, letterSpacing: '-0.5px' }}>
          SY0-701 <span style={{ color: '#f2a900' }}>·</span> 42-Day Sprint
        </h1>
        <p style={{ color: '#8b98a8', fontSize: 13.5, marginTop: 4 }}>
          June 19 → July 30, 2026 · Exam 10:15 AM · Check-in 9:45 AM
        </p>
      </div>

      <div style={{ position: 'sticky', top: 0, zIndex: 20, background: 'rgba(14,17,22,0.92)', backdropFilter: 'blur(10px)', borderBottom: '1px solid #283340' }}>
        <div style={{ maxWidth: 840, margin: '0 auto', padding: '12px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
          <div className="mono" style={{ fontSize: 13, color: '#8b98a8', whiteSpace: 'nowrap' }}>
            <span style={{ color: '#f2a900', fontWeight: 700 }}>{daysUntilExam}</span> days left
          </div>
          <div style={{ flex: 1, maxWidth: 200 }}>
            <div style={{ height: 6, background: '#1c232d', borderRadius: 99, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${progressPct}%`, background: '#3fb950', borderRadius: 99, transition: 'width 0.3s' }} />
            </div>
          </div>
          <div className="mono" style={{ fontSize: 13, color: '#3fb950', fontWeight: 700 }}>{progressPct}%</div>
        </div>
      </div>

      <div style={{ maxWidth: 840, margin: '0 auto', padding: '20px 16px' }}>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16, alignItems: 'center' }}>
          {weeks.map(w => (
            <button key={w} className={`week-btn ${activeWeek === w ? 'active' : ''}`} onClick={() => setActiveWeek(w)}>
              Week {w} — {weekLabels[w]}
            </button>
          ))}
          <button className="reset-btn" onClick={resetAll} style={{ marginLeft: 'auto' }}>Reset progress</button>
        </div>

        {visibleDays.map(d => {
          const dayCompletedCount = d.tasks.filter((_, idx) => completed[`${d.day}-${idx}`]).length;
          const isDayDone = dayCompletedCount === d.tasks.length;
          const color = DOMAIN_COLORS[d.domain] || '#8b98a8';
          return (
            <div key={d.day} style={{ background: '#161b22', border: `1px solid ${isDayDone ? '#3fb950' : '#283340'}`, borderRadius: 10, marginBottom: 12, overflow: 'hidden' }}>
              <div style={{ padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: '1px solid #283340' }}>
                <div className="mono" style={{ fontSize: 11, fontWeight: 700, color, background: `${color}1a`, padding: '3px 8px', borderRadius: 4, border: `1px solid ${color}44`, whiteSpace: 'nowrap' }}>
                  Day {d.day}
                </div>
                <div className="mono" style={{ fontSize: 12, color: '#8b98a8', whiteSpace: 'nowrap' }}>{d.date}</div>
                <div style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>{d.domainName}</div>
                <div className="mono" style={{ fontSize: 11, color: '#8b98a8', whiteSpace: 'nowrap' }}>{dayCompletedCount}/{d.tasks.length}</div>
              </div>
              <div style={{ padding: '8px 16px' }}>
                {d.tasks.map((task, idx) => {
                  const key = `${d.day}-${idx}`;
                  const isDone = !!completed[key];
                  return (
                    <div key={idx} className="task-row" onClick={() => toggleTask(d.day, idx)} style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '8px 4px', borderRadius: 6, cursor: 'pointer' }}>
                      <div className={`checkbox-custom ${isDone ? 'done' : ''}`} style={{ marginTop: 1 }}>
                        {isDone && <span style={{ color: '#0e1116', fontSize: 12, fontWeight: 700 }}>✓</span>}
                      </div>
                      <span style={{ fontSize: 13.5, lineHeight: 1.5, color: isDone ? '#8b98a8' : '#e6edf3', textDecoration: isDone ? 'line-through' : 'none' }}>{task}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StudyTracker />);
</script>
</body>
</html>
