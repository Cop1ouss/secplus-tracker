<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#161320">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="shared/base.css">
<title>Watch Schedule — Sec+ Mission Hub</title>
<style>
  .progress-card{background:var(--panel); border:2px solid var(--cyan); border-radius:12px; padding:14px 16px; margin-bottom:20px;}
  .progress-num{font-family:var(--pixel); font-size:22px; color:var(--cyan);}
  .progress-lbl{font-family:var(--mono); font-size:9.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.3px; margin-top:4px;}
  .progress-track{width:100%; height:10px; background:#120f1c; border-radius:5px; overflow:hidden; border:1px solid var(--line); margin-top:10px;}
  .progress-fill{height:100%; background:var(--cyan); transition:width .3s ease;}

  .day-group{margin-bottom:18px;}
  .day-head{
    padding:8px 4px; margin-bottom:8px; border-bottom:2px solid var(--line);
  }
  .day-label{font-family:var(--pixel); font-size:9.5px; letter-spacing:.4px;}
  .day-sub{font-family:var(--mono); font-size:9px; color:var(--text-dim); margin-top:3px;}
  .day-count{font-family:var(--mono); font-size:9px; color:var(--text-dim); float:right;}

  .video-row{
    display:flex; align-items:center; gap:12px; background:var(--panel); border:2px solid var(--line);
    border-left-width:4px; border-radius:9px; padding:12px 14px; margin-bottom:8px; cursor:pointer;
  }
  .video-row.watched{opacity:.6;}
  .video-check{
    width:22px; height:22px; border-radius:6px; border:2px solid var(--line); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }
  .video-row.watched .video-check{background:var(--hp-green); border-color:var(--hp-green); color:#0a1a0f;}
  .video-title{font-family:var(--sans); font-size:12px; flex:1;}
  .video-dur{font-family:var(--mono); font-size:10px; color:var(--text-dim); flex-shrink:0;}
  .video-row.watched .video-title{text-decoration:line-through; color:var(--text-dim);}
</style>
</head>
<body>
<div class="frame">
  <a class="hub-link" href="index.html">← Hub</a>
  <div class="title" style="color:var(--cyan)">📺 WATCH SCHEDULE 📺</div>
  <div class="subtitle">Course video progress tracker.</div>

  <div class="progress-card">
    <div class="progress-num" id="progressNum">0 / 0</div>
    <div class="progress-lbl">videos watched</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="dayGroups"></div>

  <div class="reset-row">
    <button class="reset-link" onclick="resetSchedule()">reset watch progress</button>
  </div>
</div>

<script src="shared/config.js"></script>
<script>
const DAY_META = {
  wed1: { label:'WEDNESDAY', sub:'Domain 3 — Architecture', domains:['d3'] },
  thu:  { label:'THURSDAY',  sub:'Domain 2 — Threats & Vulnerabilities', domains:['d2'] },
  fri:  { label:'FRIDAY',    sub:'Domain 1 + 5 — Combined', domains:['d1','d5'] },
  sat:  { label:'SATURDAY',  sub:'Full Consolidation', domains:[] },
};
const DAY_ORDER = ['wed1', 'thu', 'fri', 'sat'];

let schedule = {};
let schedState = { watched: {} };

function loadScheduleState(){
  const loaded = loadScheduleStateReadOnly();
  schedState = { watched: (loaded && loaded.watched) || {} };
}
function saveScheduleState(){
  try{ localStorage.setItem(STORAGE_KEYS.schedule, JSON.stringify(schedState)); }
  catch(e){ console.error('save failed', e); }
}

function resetSchedule(){
  if(!confirm('Reset all watch progress? This cannot be undone.')) return;
  schedState = { watched: {} };
  saveScheduleState();
  render();
}

function toggleWatched(id){
  schedState.watched[id] = !schedState.watched[id];
  saveScheduleState();
  render();
}

function dayAccentColor(meta){
  if(meta.domains.length === 1) return BOSSES.find(b => b.id === meta.domains[0]).color;
  return 'var(--gold)';
}

function render(){
  let total = 0, watchedCount = 0;
  DAY_ORDER.forEach(dayKey => {
    (schedule[dayKey] || []).forEach((v, i) => {
      total++;
      if(schedState.watched[`${dayKey}__${i}`]) watchedCount++;
    });
  });
  document.getElementById('progressNum').textContent = `${watchedCount} / ${total}`;
  document.getElementById('progressFill').style.width = total ? `${(watchedCount/total)*100}%` : '0%';

  const container = document.getElementById('dayGroups');
  container.innerHTML = '';
  DAY_ORDER.forEach(dayKey => {
    const videos = schedule[dayKey];
    if(!videos || videos.length === 0) return;
    const meta = DAY_META[dayKey];
    const accent = dayAccentColor(meta);
    const dayWatched = videos.filter((v,i) => schedState.watched[`${dayKey}__${i}`]).length;

    const group = document.createElement('div');
    group.className = 'day-group';
    group.innerHTML = `
      <div class="day-head" style="color:${accent}">
        <span class="day-label">${escapeHtml(meta.label)}</span>
        <span class="day-count">${dayWatched} / ${videos.length}</span>
        <div class="day-sub">${escapeHtml(meta.sub)}</div>
      </div>
    `;
    videos.forEach((v, i) => {
      const id = `${dayKey}__${i}`;
      const [title, duration] = v;
      const watched = !!schedState.watched[id];
      const row = document.createElement('div');
      row.className = 'video-row' + (watched ? ' watched' : '');
      row.style.borderLeftColor = accent;
      row.onclick = () => toggleWatched(id);
      row.innerHTML = `
        <span class="video-check">${watched ? '✓' : ''}</span>
        <span class="video-title">${escapeHtml(title)}</span>
        <span class="video-dur">${escapeHtml(duration)}</span>
      `;
      group.appendChild(row);
    });
    container.appendChild(group);
  });
}

async function loadSchedule(){
  try{
    const res = await fetch('./data/schedule.json');
    schedule = await res.json();
  }catch(e){
    console.error('failed to load schedule.json', e);
    schedule = {};
  }
}

(async function init(){
  loadScheduleState();
  await loadSchedule();
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
