<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#161320">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sec+ Bosses">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Sec+ Boss Battle Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700;800&display=swap');

  :root{
    --bg-deep:#161320;
    --panel:#211c30;
    --panel-raised:#2b2440;
    --line:#3a3153;
    --text:#ece7f7;
    --text-dim:#9d93bb;
    --gold:#f5c451;
    --cyan:#00c8ff;
    --hp-green:#4ade80;
    --hp-yellow:#facc15;
    --hp-red:#f87171;
    --pixel:'Press Start 2P', monospace;
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg-deep); color:var(--text); font-family:var(--sans);
    padding:20px 14px calc(20px + env(safe-area-inset-bottom));
    overscroll-behavior:none;
  }

  .frame{max-width:520px; margin:0 auto;}
  .title{
    font-family:var(--pixel); font-size:13px; color:var(--gold); text-align:center;
    letter-spacing:1px; margin-bottom:4px; line-height:1.8;
  }
  .subtitle{text-align:center; font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:22px;}

  /* ---------- Character panel ---------- */
  .char-panel{
    display:flex; align-items:center; gap:14px; background:var(--panel); border:2px solid var(--line);
    border-radius:12px; padding:14px; margin-bottom:20px;
  }
  .avatar-wrap{width:64px; height:76px; position:relative; flex-shrink:0;}
  .avatar{width:100%; height:100%; position:relative;}
  .avatar .cape{
    position:absolute; top:12px; left:-8px; width:80px; height:58px;
    background:linear-gradient(180deg, var(--gold), rgba(245,196,81,0));
    clip-path:polygon(22% 0%, 78% 0%, 100% 100%, 0% 100%);
    opacity:0; transition:opacity .35s; z-index:0;
  }
  .avatar .hood{
    position:absolute; top:8px; left:8px; width:48px; height:56px; background:var(--panel-raised);
    border:2px solid var(--line); border-radius:24px 24px 14px 14px / 30px 30px 10px 10px; z-index:1;
  }
  .avatar .visor{
    position:absolute; top:27px; left:16px; width:32px; height:11px; background:var(--cyan);
    border-radius:6px; box-shadow:0 0 8px var(--cyan); z-index:2; transition:.3s;
  }
  .avatar .badge{
    position:absolute; bottom:15px; left:26px; width:12px; height:12px; background:var(--gold);
    border-radius:2px; transform:rotate(45deg); opacity:0; box-shadow:0 0 6px var(--gold); z-index:2; transition:.3s;
  }
  .avatar.rank-analyst .badge,
  .avatar.rank-sentinel .badge,
  .avatar.rank-full .badge{opacity:1;}
  .avatar.rank-sentinel .cape,
  .avatar.rank-full .cape{opacity:.85;}
  .avatar.rank-sentinel .visor{background:var(--gold); box-shadow:0 0 10px var(--gold);}
  .avatar.rank-full .visor{background:var(--hp-green); box-shadow:0 0 12px var(--hp-green);}
  .avatar.rank-full .cape{opacity:1;}

  .char-info{flex:1; min-width:0;}
  .char-name{font-family:var(--sans); font-weight:800; font-size:13.5px;}
  .char-rank{font-family:var(--mono); font-size:10.5px; color:var(--gold); margin-top:2px; margin-bottom:8px; letter-spacing:.4px;}
  .xp-track{width:100%; height:9px; background:#120f1c; border-radius:5px; overflow:hidden; border:1px solid var(--line);}
  .xp-fill{height:100%; background:var(--cyan); transition:width .4s ease;}
  .xp-caption{font-family:var(--mono); font-size:9px; color:var(--text-dim); margin-top:5px;}

  /* ---------- Daily quests ---------- */
  .mission-card{background:var(--panel); border:2px solid var(--gold); border-radius:12px; padding:14px 16px; margin-bottom:14px;}
  .mission-card.done{border-color:var(--hp-green);}
  .mission-card.empty{border-color:var(--line);}
  .mission-label{font-family:var(--pixel); font-size:9.5px; color:var(--gold); letter-spacing:.5px; margin-bottom:8px;}
  .mission-card.done .mission-label{color:var(--hp-green);}
  .mission-title{font-family:var(--sans); font-weight:700; font-size:13px; margin-bottom:6px; line-height:1.4;}
  .mission-topics, .mission-target{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-bottom:4px;}
  .mission-track{width:100%; height:8px; background:#120f1c; border-radius:5px; overflow:hidden; border:1px solid var(--line); margin-top:8px;}
  .mission-fill{height:100%; background:var(--gold); transition:width .4s ease;}
  .mission-card.done .mission-fill{background:var(--hp-green);}
  .mission-caption{font-family:var(--mono); font-size:9px; color:var(--text-dim); margin-top:6px;}

  .week-list{display:flex; flex-direction:column; gap:3px; margin-bottom:20px;}
  .week-row{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:10px; color:var(--text-dim); padding:6px 8px; border-radius:6px;}
  .week-row.today{background:var(--panel-raised); color:var(--text);}
  .week-row.done{color:var(--hp-green);}
  .week-day{width:28px; flex-shrink:0; font-weight:700;}
  .week-label{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .week-check{flex-shrink:0; width:16px; text-align:center;}

  .stat-row{display:flex; gap:10px; margin-bottom:22px;}
  .stat-box{
    flex:1; background:var(--panel); border:2px solid var(--line); border-radius:10px;
    padding:12px 6px; text-align:center;
  }
  .stat-box .num{font-family:var(--pixel); font-size:17px; color:var(--cyan);}
  .stat-box .lbl{font-family:var(--mono); font-size:8.5px; color:var(--text-dim); margin-top:6px; text-transform:uppercase; letter-spacing:.3px;}

  .actions{display:flex; gap:10px; margin-bottom:12px;}
  .action-btn{
    flex:1; background:var(--panel-raised); border:2px solid var(--line); border-radius:10px;
    color:var(--text); font-family:var(--sans); font-weight:700; font-size:12.5px; padding:16px 8px; cursor:pointer;
    min-height:64px;
  }
  .action-btn:active{border-color:var(--gold); transform:scale(.98);}
  .action-btn .plus{color:var(--gold); font-family:var(--mono); font-size:11px; display:block; margin-top:5px;}

  .actions2{display:flex; gap:10px; margin-bottom:24px;}
  .action-btn2{
    flex:1; background:var(--panel); border:1px solid var(--line); border-radius:9px; color:var(--text-dim);
    font-family:var(--mono); font-size:10px; padding:11px 8px; cursor:pointer; min-height:40px;
  }
  .action-btn2:active{border-color:var(--gold); color:var(--gold);}

  .boss-list{display:flex; flex-direction:column; gap:12px;}
  .boss{
    background:var(--panel); border:2px solid var(--line); border-radius:10px; padding:14px 16px; cursor:pointer;
  }
  .boss:active{border-color:var(--gold);}
  .boss-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px; flex-wrap:wrap; gap:6px;}
  .boss-title{font-family:var(--pixel); font-weight:400; font-size:11.5px; color:var(--text); letter-spacing:.5px;}
  .boss-name{font-family:var(--sans); font-weight:700; font-size:11px; color:var(--text-dim);}
  .boss-sub{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-bottom:8px;}
  .hp-track{
    width:100%; height:16px; background:#120f1c; border-radius:8px; overflow:hidden; border:1px solid var(--line);
    margin-bottom:10px;
  }
  .hp-fill{height:100%; transition:width .4s ease; border-radius:8px;}
  .boss-controls{display:flex; justify-content:space-between; align-items:center;}
  .hp-text{font-family:var(--mono); font-size:10.5px; color:var(--text-dim);}
  .bust-btn{
    background:var(--panel-raised); border:1px solid var(--gold); color:var(--gold); font-family:var(--sans);
    font-weight:700; font-size:11.5px; padding:9px 14px; border-radius:7px; cursor:pointer; min-height:40px;
  }
  .bust-btn:active{background:var(--gold); color:#231a0a;}
  .defeated-tag{font-family:var(--pixel); font-size:8.5px; color:var(--hp-green); letter-spacing:1px;}

  .flash{animation:flashPulse .5s ease;}
  @keyframes flashPulse{
    0%{box-shadow:0 0 0 0 rgba(245,196,81,.6);}
    100%{box-shadow:0 0 0 12px rgba(245,196,81,0);}
  }

  .reset-row{text-align:center; margin-top:24px; padding-bottom:10px;}
  .reset-link{font-family:var(--mono); font-size:10px; color:var(--text-dim); background:none; border:none; cursor:pointer; text-decoration:underline;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--panel-raised); border:2px solid var(--gold); color:var(--gold); font-family:var(--pixel);
    font-size:9.5px; padding:12px 16px; border-radius:8px; transition:.25s; pointer-events:none; z-index:100;
    max-width:88%; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- Battle modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,8,16,.86); display:flex; align-items:center; justify-content:center;
    z-index:200; padding:16px; opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .modal-overlay.show{opacity:1; pointer-events:auto;}
  .battle-modal{
    background:var(--panel); border:2px solid var(--gold); border-radius:14px; max-width:480px; width:100%;
    max-height:88vh; overflow-y:auto; padding:20px; position:relative;
  }
  .modal-close{
    position:absolute; top:10px; right:10px; background:none; border:none; color:var(--text-dim);
    font-family:var(--mono); font-size:18px; cursor:pointer; padding:6px 10px; line-height:1;
  }
  .modal-close:active{color:var(--gold);}

  .battle-boss-title{font-family:var(--pixel); font-size:13px; color:var(--gold); margin-bottom:6px; padding-right:24px;}
  .battle-boss-sub{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-bottom:16px;}
  .battle-hp-track{width:100%; height:14px; background:#120f1c; border-radius:7px; overflow:hidden; border:1px solid var(--line); margin-bottom:18px;}
  .battle-hp-fill{height:100%; transition:width .4s ease;}

  .flavor-text{font-family:var(--sans); font-size:13.5px; line-height:1.6; color:var(--text); margin-bottom:20px; font-style:italic;}
  .engage-btn{
    width:100%; background:var(--gold); color:#231a0a; border:none; border-radius:9px; font-family:var(--sans);
    font-weight:800; font-size:13.5px; padding:14px; cursor:pointer;
  }
  .engage-btn:active{transform:scale(.98);}

  .q-text{font-family:var(--sans); font-weight:700; font-size:14px; line-height:1.5; margin-bottom:16px;}
  .q-options{display:flex; flex-direction:column; gap:9px;}
  .q-opt{
    background:var(--panel-raised); border:2px solid var(--line); border-radius:9px; color:var(--text);
    font-family:var(--sans); font-size:12.5px; text-align:left; padding:12px 14px; cursor:pointer; min-height:44px;
  }
  .q-opt:active{border-color:var(--gold);}
  .q-opt.correct{border-color:var(--hp-green); background:rgba(74,222,128,.12); color:var(--hp-green);}
  .q-opt.incorrect{border-color:var(--hp-red); background:rgba(248,113,113,.12); color:var(--hp-red);}
  .q-opt:disabled{cursor:default;}
  .q-meta{font-family:var(--mono); font-size:9.5px; color:var(--text-dim); margin-top:14px; text-align:center;}

  .defeat-banner{
    font-family:var(--pixel); font-size:12px; color:var(--hp-green); text-align:center; letter-spacing:1px;
    border:2px solid var(--hp-green); border-radius:9px; padding:14px; margin-bottom:16px; background:rgba(74,222,128,.08);
  }
  .quest-banner{
    font-family:var(--pixel); font-size:10px; color:var(--gold); text-align:center; letter-spacing:.5px;
    border:2px solid var(--gold); border-radius:9px; padding:12px; margin-bottom:16px; background:rgba(245,196,81,.08);
    line-height:1.6;
  }
  .briefing-head{
    font-family:var(--pixel); font-size:10.5px; letter-spacing:.5px; margin-bottom:10px;
  }
  .briefing-head.hit{color:var(--hp-green);}
  .briefing-head.miss{color:var(--hp-red);}
  .briefing-card{
    background:var(--panel-raised); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:18px;
  }
  .briefing-lede{font-family:var(--sans); font-size:12px; color:var(--text-dim); font-style:italic; margin-bottom:10px;}
  .briefing-answer{font-family:var(--mono); font-size:11px; color:var(--gold); margin-bottom:8px;}
  .briefing-why{font-family:var(--sans); font-size:13px; line-height:1.55;}
  .xp-pill{
    display:inline-block; font-family:var(--mono); font-size:10.5px; color:var(--cyan); background:rgba(0,200,255,.1);
    border:1px solid var(--cyan); border-radius:20px; padding:4px 10px; margin-bottom:14px;
  }
  .continue-btn{
    width:100%; background:var(--panel-raised); border:2px solid var(--gold); color:var(--gold); border-radius:9px;
    font-family:var(--sans); font-weight:800; font-size:13px; padding:13px; cursor:pointer;
  }
  .continue-btn:active{background:var(--gold); color:#231a0a;}
</style>
</head>
<body>
<div class="frame">
  <div class="title">⚔ SEC+ BOSS BATTLE TRACKER ⚔</div>
  <div class="subtitle">5 domains. 5 bosses. every correct answer is a hit.</div>

  <div class="char-panel">
    <div class="avatar-wrap"><div class="avatar" id="avatar">
      <div class="cape"></div>
      <div class="hood"></div>
      <div class="visor"></div>
      <div class="badge"></div>
    </div></div>
    <div class="char-info">
      <div class="char-name">AGENT DAJONI</div>
      <div class="char-rank" id="charRank">SOC Recruit</div>
      <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
      <div class="xp-caption" id="xpCaption"></div>
    </div>
  </div>

  <div id="questSection"></div>

  <div class="stat-row">
    <div class="stat-box"><div class="num" id="xpTotal">0</div><div class="lbl">Total XP</div></div>
    <div class="stat-box"><div class="num" id="streakNum">0</div><div class="lbl">Day Streak</div></div>
    <div class="stat-box"><div class="num" id="bustedTotal">0/43</div><div class="lbl">Busted</div></div>
  </div>

  <div class="actions">
    <button class="action-btn" onclick="logAction('anki')">📇 Anki done<span class="plus">+10 XP</span></button>
    <button class="action-btn" onclick="logAction('obsidian')">📓 Logged entry<span class="plus">+5 XP</span></button>
  </div>

  <div class="actions2">
    <button class="action-btn2" onclick="exportAnki()">📤 Export not-mastered (Anki)</button>
    <button class="action-btn2" onclick="document.getElementById('importFile').click()">📥 Import new exam</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
  </div>

  <div class="boss-list" id="bossList"></div>

  <div class="reset-row">
    <button class="reset-link" onclick="resetProgress()">reset all progress</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="battleOverlay">
  <div class="battle-modal" id="battleModal">
    <button class="modal-close" onclick="closeBattle()">✕</button>
    <div id="battleContent"></div>
  </div>
</div>

<script>
const BOSSES = [
  {id:'d4', domain:'4.0', title:'GHOST ADMIN', domainLabel:'Domain 4.0 — Security Operations', maxHp:15,
    flavor:"A hijacked administrator account, still carrying valid credentials. It moves through the network like it belongs there — because once, it did."},
  {id:'d2', domain:'2.0', title:'VECTORWRAITH', domainLabel:'Domain 2.0 — Threats, Vulnerabilities & Mitigations', maxHp:8,
    flavor:"It has no fixed form — phishing lure, rogue access point, injected packet. Name the vector before it reshapes into the next one."},
  {id:'d3', domain:'3.0', title:'BASTION PRIME', domainLabel:'Domain 3.0 — Security Architecture', maxHp:8,
    flavor:"A living fortress built from firewalls, zones, and redundant systems. Every wall is a design decision — find the ones that hold."},
  {id:'d5', domain:'5.0', title:'THE AUDITOR-GENERAL', domainLabel:'Domain 5.0 — Security Program Management', maxHp:7,
    flavor:"It carries a risk register in one hand and a compliance checklist in the other. It cannot be intimidated — only satisfied."},
  {id:'d1', domain:'1.0', title:'ROOT WARDEN', domainLabel:'Domain 1.0 — General Security Concepts', maxHp:5,
    flavor:"Guardian of the root of trust. Old, foundational, and unwilling to authenticate anything it doesn't recognize."},
];

const RANKS = [
  {title:'SOC Recruit', floor:0,   next:75,  css:'rank-recruit'},
  {title:'Analyst',     floor:75,  next:200, css:'rank-analyst'},
  {title:'Sentinel',    floor:200, next:400, css:'rank-sentinel'},
  {title:'Full Analyst',floor:400, next:null,css:'rank-full'},
];

const STORAGE_KEY = 'secplus-boss-tracker-state';
const REVIEW_XP = 2;
const HIT_XP = 5;
const QUEST_BONUS_XP = 15;

let baseQuestionBank = [];
let questionBank = [];
let QUESTS = [];

let state = {
  xp: 0,
  busted: {d4:0, d2:0, d3:0, d5:0, d1:0},
  logDates: [],
  metBosses: {d4:false, d2:false, d3:false, d5:false, d1:false},
  qstats: {},
  completedQuests: {},
  dailyEngagement: {},
  maxHpOverrides: {},
  importedQuestions: []
};

let battle = null; // {bossId, queue:[qid,...], pos, currentQid, shuffledOptions}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const loaded = JSON.parse(raw);
      state = Object.assign({}, state, loaded);
      state.busted = Object.assign({d4:0,d2:0,d3:0,d5:0,d1:0}, loaded.busted || {});
      state.metBosses = Object.assign({d4:false,d2:false,d3:false,d5:false,d1:false}, loaded.metBosses || {});
      state.qstats = loaded.qstats || {};
      state.logDates = loaded.logDates || [];
      state.completedQuests = loaded.completedQuests || {};
      state.dailyEngagement = loaded.dailyEngagement || {};
      state.maxHpOverrides = loaded.maxHpOverrides || {};
      state.importedQuestions = loaded.importedQuestions || [];
    }
  }catch(e){ /* first run, no saved state */ }
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){ console.error('save failed', e); }
}

function pad2(n){ return String(n).padStart(2,'0'); }
function ymd(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }
function todayStr(){ const d = new Date(); return ymd(d.getFullYear(), d.getMonth(), d.getDate()); }

function computeStreak(){
  if(state.logDates.length === 0) return 0;
  const dates = [...new Set(state.logDates)].sort().reverse();
  let streak = 0;
  let cursor = new Date();
  for(let i=0;i<dates.length;i++){
    const expected = ymd(cursor.getFullYear(), cursor.getMonth(), cursor.getDate());
    if(dates[i] === expected){
      streak++;
      cursor.setDate(cursor.getDate()-1);
    } else {
      break;
    }
  }
  return streak;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 1700);
}

function logAction(type){
  const xpGain = type === 'anki' ? 10 : 5;
  state.xp += xpGain;
  state.logDates.push(todayStr());
  saveState();
  render();
  showToast(`+${xpGain} XP EARNED`);
  if(navigator.vibrate) navigator.vibrate(15);
}

function resetProgress(){
  if(!confirm('Reset all XP, streak, and boss progress? This cannot be undone.')) return;
  state = {
    xp:0, busted:{d4:0,d2:0,d3:0,d5:0,d1:0}, logDates:[],
    metBosses:{d4:false,d2:false,d3:false,d5:false,d1:false}, qstats:{},
    completedQuests:{}, dailyEngagement:{}, maxHpOverrides:{}, importedQuestions:[]
  };
  questionBank = [...baseQuestionBank];
  saveState();
  render();
}

function hpColor(pct){
  if(pct >= 60) return 'var(--hp-red)';
  if(pct >= 25) return 'var(--hp-yellow)';
  return 'var(--hp-green)';
}

function bossMaxHp(boss){
  const override = state.maxHpOverrides && state.maxHpOverrides[boss.id];
  return override === undefined ? boss.maxHp : override;
}

function getRank(xp){
  let r = RANKS[0];
  for(const rank of RANKS){ if(xp >= rank.floor) r = rank; }
  return r;
}

function renderCharPanel(){
  const rank = getRank(state.xp);
  const avatar = document.getElementById('avatar');
  avatar.className = 'avatar ' + rank.css;
  document.getElementById('charRank').textContent = rank.title;
  const fillPct = rank.next ? Math.min(100, ((state.xp - rank.floor) / (rank.next - rank.floor)) * 100) : 100;
  document.getElementById('xpFill').style.width = fillPct + '%';
  document.getElementById('xpCaption').textContent = rank.next
    ? `${state.xp} / ${rank.next} XP to ${RANKS[RANKS.indexOf(rank)+1].title}`
    : `${state.xp} XP — max rank reached`;
}

function engagementForQuest(quest){
  const day = state.dailyEngagement[quest.dateStr] || {};
  return quest.targetBosses.reduce((sum,bid)=> sum + (day[bid]||0), 0);
}

function renderQuestsSection(){
  const container = document.getElementById('questSection');
  if(!QUESTS.length){ container.innerHTML = ''; return; }
  const today = todayStr();
  const todayQuest = QUESTS.find(q=>q.dateStr === today);

  let heroHtml;
  if(todayQuest){
    const engaged = engagementForQuest(todayQuest);
    const done = !!state.completedQuests[todayQuest.dateStr];
    const pct = Math.min(100, (engaged/todayQuest.threshold)*100);
    const bossTitles = todayQuest.targetBosses.map(bid=>BOSSES.find(b=>b.id===bid).title).join(' + ');
    heroHtml = `
      <div class="mission-card ${done?'done':''}">
        <div class="mission-label">${done ? "✅ TODAY'S MISSION — COMPLETE" : "🎯 TODAY'S MISSION"}</div>
        <div class="mission-title">${escapeHtml(todayQuest.label)}</div>
        ${todayQuest.topics.length ? `<div class="mission-topics">Focus: ${escapeHtml(todayQuest.topics.join(', '))}</div>` : ''}
        <div class="mission-target">Target: ${escapeHtml(bossTitles)}</div>
        <div class="mission-track"><div class="mission-fill" style="width:${pct}%"></div></div>
        <div class="mission-caption">${Math.min(engaged,todayQuest.threshold)} / ${todayQuest.threshold} questions engaged</div>
      </div>`;
  } else {
    heroHtml = `<div class="mission-card empty"><div class="mission-label">🎯 TODAY'S MISSION</div><div class="mission-title">No mission scheduled today — free drill any boss you like.</div></div>`;
  }

  const weekHtml = QUESTS.map(q=>{
    const isToday = q.dateStr === today;
    const done = !!state.completedQuests[q.dateStr];
    return `<div class="week-row ${isToday?'today':''} ${done?'done':''}">
      <span class="week-day">${escapeHtml(q.weekday)}</span>
      <span class="week-label">${escapeHtml(q.label)}</span>
      <span class="week-check">${done ? '✅' : isToday ? '▶' : ''}</span>
    </div>`;
  }).join('');

  container.innerHTML = heroHtml + `<div class="week-list">${weekHtml}</div>`;
}

function render(flash, flashBoss){
  document.getElementById('xpTotal').textContent = state.xp;
  document.getElementById('streakNum').textContent = computeStreak();
  const totalBusted = Object.values(state.busted).reduce((a,b)=>a+b,0);
  const totalMax = BOSSES.reduce((a,b)=>a+bossMaxHp(b),0);
  document.getElementById('bustedTotal').textContent = `${totalBusted}/${totalMax}`;

  renderCharPanel();
  renderQuestsSection();

  const list = document.getElementById('bossList');
  list.innerHTML = '';
  BOSSES.forEach(boss=>{
    const maxHp = bossMaxHp(boss);
    const busted = state.busted[boss.id];
    const hpRemaining = maxHp - busted;
    const pctRemaining = (hpRemaining / maxHp) * 100;
    const defeated = hpRemaining <= 0;

    const div = document.createElement('div');
    div.className = 'boss' + (flashBoss === boss.id ? ' flash' : '');
    div.onclick = ()=>openBattle(boss.id);
    div.innerHTML = `
      <div class="boss-head">
        <span class="boss-title">${boss.title}</span>
        ${defeated ? '<span class="defeated-tag">DEFEATED</span>' : ''}
      </div>
      <div class="boss-name">${boss.domainLabel}</div>
      <div class="boss-sub">${hpRemaining} / ${maxHp} HP · ${Math.round((busted/maxHp)*100)}% mastery</div>
      <div class="hp-track"><div class="hp-fill" style="width:${pctRemaining}%; background:${hpColor(pctRemaining)}"></div></div>
      <div class="boss-controls">
        <span class="hp-text">${busted} traps busted</span>
        <button class="bust-btn" onclick="event.stopPropagation(); openBattle('${boss.id}')">${defeated ? '🗡 Review' : '⚔ Battle'}</button>
      </div>
    `;
    list.appendChild(div);
  });
}

/* ---------- Battle mode ---------- */

function qstatFor(qid, q){
  if(!state.qstats[qid]){
    state.qstats[qid] = { box: q.gotRightAttempt1 ? 1 : 0, streak:0, seen:0, right:0, wrong:0 };
  }
  return state.qstats[qid];
}

function buildQueue(bossId){
  const boss = BOSSES.find(b=>b.id===bossId);
  const questions = questionBank.filter(q=>q.domain===boss.domain);
  questions.forEach(q=>qstatFor(q.id, q));
  const sorted = [...questions].sort((a,b)=>{
    const sa = state.qstats[a.id], sb = state.qstats[b.id];
    if(sa.box !== sb.box) return sa.box - sb.box;
    if(sa.seen !== sb.seen) return sa.seen - sb.seen;
    return Math.random() - 0.5;
  });
  return sorted.map(q=>q.id);
}

function openBattle(bossId){
  const boss = BOSSES.find(b=>b.id===bossId);
  battle = { bossId, queue: [], pos: 0, shuffledOptions: null };
  document.getElementById('battleOverlay').classList.add('show');
  if(!state.metBosses[bossId]){
    renderIntroScreen(boss);
  } else {
    startBattleQuestions(bossId);
  }
}

function renderIntroScreen(boss){
  const maxHp = bossMaxHp(boss);
  const hpRemaining = maxHp - state.busted[boss.id];
  const pct = (hpRemaining / maxHp) * 100;
  document.getElementById('battleContent').innerHTML = `
    <div class="battle-boss-title">${boss.title}</div>
    <div class="battle-boss-sub">${boss.domainLabel}</div>
    <div class="battle-hp-track"><div class="battle-hp-fill" style="width:${pct}%; background:${hpColor(pct)}"></div></div>
    <div class="flavor-text">${boss.flavor}</div>
    <button class="engage-btn" onclick="startBattleQuestions('${boss.id}')">⚔ ENGAGE</button>
  `;
}

function startBattleQuestions(bossId){
  state.metBosses[bossId] = true;
  saveState();
  battle.queue = buildQueue(bossId);
  battle.pos = 0;
  renderQuestionScreen();
}

function renderQuestionScreen(){
  const boss = BOSSES.find(b=>b.id===battle.bossId);
  if(battle.queue.length === 0){
    document.getElementById('battleContent').innerHTML = `
      <div class="battle-boss-title">${boss.title}</div>
      <div class="flavor-text">No questions loaded for this domain yet.</div>
    `;
    return;
  }
  if(battle.pos >= battle.queue.length){
    battle.queue = buildQueue(battle.bossId);
    battle.pos = 0;
  }
  const qid = battle.queue[battle.pos];
  const q = questionBank.find(x=>x.id===qid);
  battle.currentQid = qid;

  const opts = [...q.options];
  for(let i=opts.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [opts[i],opts[j]] = [opts[j],opts[i]];
  }
  battle.shuffledOptions = opts;

  const maxHp = bossMaxHp(boss);
  const hpRemaining = maxHp - state.busted[boss.id];
  const pct = (hpRemaining / maxHp) * 100;
  const defeated = hpRemaining <= 0;

  document.getElementById('battleContent').innerHTML = `
    <div class="battle-boss-title">${boss.title}${defeated ? ' · <span style="color:var(--hp-green)">DEFEATED</span>' : ''}</div>
    <div class="battle-boss-sub">${boss.domainLabel} — ${hpRemaining}/${maxHp} HP${defeated ? ' (review mode)' : ''}</div>
    <div class="battle-hp-track"><div class="battle-hp-fill" style="width:${pct}%; background:${hpColor(pct)}"></div></div>
    <div class="q-text">${escapeHtml(q.question)}</div>
    <div class="q-options" id="qOptions">
      ${opts.map((o,i)=>`<button class="q-opt" data-idx="${i}" onclick="answerQuestion(${i})">${escapeHtml(o)}</button>`).join('')}
    </div>
    <div class="q-meta">${state.qstats[qid].box >= 2 ? 'mastered · spaced review' : state.qstats[qid].box === 1 ? 'review queue' : 'priority target'}</div>
  `;
}

function answerQuestion(idx){
  const boss = BOSSES.find(b=>b.id===battle.bossId);
  const maxHp = bossMaxHp(boss);
  const q = questionBank.find(x=>x.id===battle.currentQid);
  const chosen = battle.shuffledOptions[idx];
  const correct = chosen === q.answer;
  const stat = state.qstats[q.id];

  document.querySelectorAll('#qOptions .q-opt').forEach(btn=>{
    btn.disabled = true;
    if(btn.textContent === q.answer) btn.classList.add('correct');
    else if(btn.dataset.idx == idx && !correct) btn.classList.add('incorrect');
  });

  stat.seen++;
  const wasDefeatedAlready = state.busted[boss.id] >= maxHp;
  let xpGain = 0;
  let justDefeated = false;

  if(correct){
    stat.right++;
    stat.streak++;
    stat.box = stat.streak >= 2 ? 2 : 1;
    if(!wasDefeatedAlready){
      state.busted[boss.id]++;
      xpGain = HIT_XP;
      if(state.busted[boss.id] >= maxHp) justDefeated = true;
    } else {
      xpGain = REVIEW_XP;
    }
  } else {
    stat.wrong++;
    stat.streak = 0;
    stat.box = 0;
    const requeueAt = Math.min(battle.pos + 4, battle.queue.length);
    battle.queue.splice(requeueAt, 0, q.id);
  }

  state.xp += xpGain;

  const today = todayStr();
  state.dailyEngagement[today] = state.dailyEngagement[today] || {};
  state.dailyEngagement[today][boss.id] = (state.dailyEngagement[today][boss.id] || 0) + 1;
  const completedQuest = checkQuestCompletion(today);

  saveState();

  setTimeout(()=>renderBriefing(q, correct, xpGain, justDefeated, completedQuest), 550);
}

function checkQuestCompletion(dateStr){
  const quest = QUESTS.find(q=>q.dateStr === dateStr);
  if(!quest) return null;
  if(state.completedQuests[dateStr]) return null;
  const engaged = engagementForQuest(quest);
  if(engaged >= quest.threshold){
    state.completedQuests[dateStr] = true;
    state.xp += QUEST_BONUS_XP;
    return quest;
  }
  return null;
}

function renderBriefing(q, correct, xpGain, justDefeated, completedQuest){
  const boss = BOSSES.find(b=>b.id===battle.bossId);
  const lede = correct
    ? `You pierce ${boss.title}'s defenses. Recovered logs confirm:`
    : `Your strike goes wide, but as ${boss.title} retaliates, fragments of intel spill loose:`;

  document.getElementById('battleContent').innerHTML = `
    ${justDefeated ? `<div class="defeat-banner">🏆 ${boss.title} DEFEATED</div>` : ''}
    ${completedQuest ? `<div class="quest-banner">🎯 MISSION COMPLETE<br>"${escapeHtml(completedQuest.label)}" (+${QUEST_BONUS_XP} XP)</div>` : ''}
    <div class="briefing-head ${correct ? 'hit' : 'miss'}">${correct ? '◆ HIT LANDED — INTEL EXTRACTED ◆' : '◆ MISS — INTEL LEAKED ANYWAY ◆'}</div>
    ${xpGain > 0 ? `<div class="xp-pill">+${xpGain} XP</div>` : ''}
    <div class="briefing-card">
      <div class="briefing-lede">${lede}</div>
      ${!correct ? `<div class="briefing-answer">Correct answer: ${escapeHtml(q.answer)}</div>` : ''}
      <div class="briefing-why">${escapeHtml(q.why || '')}</div>
    </div>
    <button class="continue-btn" onclick="nextQuestion()">Continue ▶</button>
  `;

  render();
}

function nextQuestion(){
  battle.pos++;
  renderQuestionScreen();
}

function closeBattle(){
  document.getElementById('battleOverlay').classList.remove('show');
  battle = null;
  render();
}

/* ---------- Daily quests ---------- */

const MONTH_MAP = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
const QUEST_LINE_RE = /^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+([A-Za-z]{3})\s+(\d{1,2})\s+—\s+(.+)$/;

function parseQuests(mdText){
  const year = new Date().getFullYear();
  const quests = [];
  for(const rawLine of mdText.split('\n')){
    const line = rawLine.trim();
    const m = line.match(QUEST_LINE_RE);
    if(!m) continue;
    const [, weekday, monAbbr, dayNum, rest] = m;
    const monthIdx = MONTH_MAP[monAbbr];
    if(monthIdx === undefined) continue;
    const dateStr = ymd(year, monthIdx, parseInt(dayNum,10));
    const colonIdx = rest.indexOf(':');
    const label = colonIdx === -1 ? rest.trim() : rest.slice(0, colonIdx).trim();
    const topicsPart = colonIdx === -1 ? '' : rest.slice(colonIdx+1).trim();
    const topics = topicsPart ? topicsPart.split(',').map(t=>t.trim()).filter(Boolean) : [];
    const domainMatches = [...label.matchAll(/Domain\s+(\d)/g)].map(x=>x[1]);
    const targetBosses = domainMatches.length
      ? domainMatches.map(dNum => BOSSES.find(b=>b.domain === `${dNum}.0`)).filter(Boolean).map(b=>b.id)
      : BOSSES.map(b=>b.id);
    const threshold = domainMatches.length ? Math.min(20, 5 * domainMatches.length) : 20;
    quests.push({ weekday, dateStr, label, topics, targetBosses, threshold });
  }
  return quests;
}

async function loadQuests(){
  try{
    const res = await fetch('./week1_sprint.md');
    const text = await res.text();
    QUESTS = parseQuests(text);
  }catch(e){
    console.error('failed to load week1_sprint.md', e);
    QUESTS = [];
  }
}

/* ---------- Anki export ---------- */

function cleanField(s){ return String(s).replace(/[\t\r\n]+/g, ' ').trim(); }

function buildAnkiExportText(){
  const notMastered = questionBank.filter(q => !(state.qstats[q.id] && state.qstats[q.id].box >= 2));
  return notMastered.map(q=>{
    const front = cleanField(`${q.question} Options: ${q.options.join(' | ')}`);
    const back = cleanField(`${q.answer} — ${q.why || ''}`);
    return `${front}\t${back}`;
  }).join('\n');
}

function downloadTextFile(content, filename){
  const blob = new Blob([content], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportAnki(){
  const content = buildAnkiExportText();
  if(!content){ showToast('NOTHING TO EXPORT — ALL MASTERED'); return; }
  downloadTextFile(content, 'secplus_anki_export.txt');
  showToast('ANKI EXPORT DOWNLOADED');
}

/* ---------- Import future exam data ---------- */

function applyImportedQuestions(){
  (state.importedQuestions || []).forEach(q=>{
    const idx = questionBank.findIndex(x=>x.id===q.id);
    if(idx === -1) questionBank.push(q); else questionBank[idx] = q;
  });
}

function mergeQuestionBank(incoming){
  let added = 0, updated = 0;
  const newWeakByDomain = {};
  incoming.forEach(q=>{
    if(!q || typeof q.id !== 'string' || typeof q.domain !== 'string' || typeof q.question !== 'string'
       || !Array.isArray(q.options) || typeof q.answer !== 'string') return;
    const idx = questionBank.findIndex(x=>x.id===q.id);
    if(idx === -1){
      questionBank.push(q);
      added++;
      if(q.gotRightAttempt1 === false){
        newWeakByDomain[q.domain] = (newWeakByDomain[q.domain]||0) + 1;
      }
    } else {
      questionBank[idx] = q;
      updated++;
    }
  });

  if(added === 0 && updated === 0){
    showToast('NO VALID QUESTIONS FOUND');
    return;
  }

  state.importedQuestions = state.importedQuestions || [];
  incoming.forEach(q=>{
    if(!q || typeof q.id !== 'string') return;
    const idx = state.importedQuestions.findIndex(x=>x.id===q.id);
    if(idx === -1) state.importedQuestions.push(q); else state.importedQuestions[idx] = q;
  });

  state.maxHpOverrides = state.maxHpOverrides || {};
  Object.entries(newWeakByDomain).forEach(([domain, count])=>{
    const boss = BOSSES.find(b=>b.domain===domain);
    if(!boss) return;
    const current = state.maxHpOverrides[boss.id] ?? boss.maxHp;
    state.maxHpOverrides[boss.id] = current + count;
  });

  saveState();
  render();
  showToast(`IMPORTED: +${added} new / ${updated} updated`);
}

function handleImportFile(event){
  const file = event.target.files[0];
  event.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const incoming = JSON.parse(reader.result);
      if(!Array.isArray(incoming)) throw new Error('Expected a JSON array');
      mergeQuestionBank(incoming);
    }catch(e){
      console.error('import failed', e);
      showToast('IMPORT FAILED — CHECK FILE FORMAT');
    }
  };
  reader.onerror = () => showToast('IMPORT FAILED — COULD NOT READ FILE');
  reader.readAsText(file);
}

/* ---------- Boot ---------- */

async function loadQuestionBank(){
  try{
    const res = await fetch('./question_bank.json');
    baseQuestionBank = await res.json();
  }catch(e){
    console.error('failed to load question_bank.json', e);
    baseQuestionBank = [];
  }
}

(async function init(){
  loadState();
  await Promise.all([loadQuestionBank(), loadQuests()]);
  questionBank = [...baseQuestionBank];
  applyImportedQuestions();
  document.getElementById('importFile').addEventListener('change', handleImportFile);
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
